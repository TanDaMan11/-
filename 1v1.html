<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1v1 Sword Fight</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #lobby {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 1000;
        }

        #lobby.hidden {
            display: none;
        }

        .title {
            font-size: 72px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #4a9eff, 0 0 40px #4a9eff;
            margin-bottom: 60px;
            text-align: center;
        }

        .subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 200px;
        }

        .btn-host {
            background: linear-gradient(to bottom, #4CAF50, #45a049);
            color: white;
        }

        .btn-join {
            background: linear-gradient(to bottom, #4a9eff, #3d8bdf);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .join-form {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .join-form.active {
            display: flex;
        }

        .code-input {
            padding: 15px 30px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            border: 3px solid #4a9eff;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 200px;
            outline: none;
        }

        .code-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .status {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
            min-height: 30px;
        }

        .back-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        #waitingRoom {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        #waitingRoom.active {
            display: flex;
        }

        .waiting-content {
            text-align: center;
        }

        .waiting-title {
            font-size: 48px;
            font-weight: bold;
            color: #4a9eff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #4a9eff;
        }

        .room-code {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 5px;
        }

        .waiting-status {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        #startBtn {
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(to bottom, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            display: none;
        }

        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(76, 175, 80, 0.6);
        }

        #startBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #gameContainer.hidden {
            display: none;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #16213e 0%, #1a1a2e 100%);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            gap: 100px;
            pointer-events: none;
            z-index: 10;
        }

        .healthContainer {
            width: 280px;
        }

        .playerName {
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .p1 .playerName { color: #4a9eff; }
        .p2 .playerName { color: #ff6b6b; text-align: right; }

        .healthBar {
            width: 100%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .healthFill {
            height: 100%;
            transition: width 0.15s ease;
            border-radius: 12px;
        }

        .p1 .healthFill {
            background: linear-gradient(to bottom, #6db3f2, #4a9eff);
        }

        .p2 .healthFill {
            background: linear-gradient(to bottom, #ff8a8a, #ff6b6b);
            float: right;
        }

        .comboDisplay {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .p2 .comboDisplay { text-align: right; }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #overlay.active {
            display: flex;
        }

        #winnerText {
            color: white;
            font-size: 64px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .match-info {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .button-group-overlay {
            display: none;
            gap: 20px;
        }

        .button-group-overlay.active {
            display: flex;
        }

        #playAgainBtn, #quitBtn {
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        #playAgainBtn {
            background: linear-gradient(to bottom, #4CAF50, #45a049);
        }

        #playAgainBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        #playAgainBtn.ready {
            background: linear-gradient(to bottom, #ffd700, #ffed4e);
            color: #000;
        }

        #quitBtn {
            background: linear-gradient(to bottom, #ff6b6b, #ff5555);
        }

        #quitBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        #opponentStatus {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-top: 20px;
            min-height: 25px;
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px #ffd700, 0 0 60px #ffd700;
            z-index: 50;
            display: none;
            opacity: 0;
        }

        #startText {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #4CAF50, 0 0 40px #4CAF50;
            z-index: 50;
            display: none;
            opacity: 0;
        }

        .connection-status {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            color: #4CAF50;
            font-size: 14px;
            z-index: 10;
        }

        .connection-status.disconnected {
            color: #ff6b6b;
        }

        .connection-status.waiting {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div id="lobby">
        <h1 class="title">⚔️ Sword Duel</h1>
        <p class="subtitle">2-Player Online Combat</p>
        
        <div class="button-group" id="mainButtons">
            <button class="btn btn-host" id="hostBtn">Host Game</button>
            <button class="btn btn-join" id="joinBtn">Join Game</button>
        </div>

        <div class="join-form" id="joinForm">
            <input type="text" class="code-input" id="codeInput" placeholder="0000" maxlength="4" />
            <button class="btn btn-join" id="connectBtn">Connect</button>
            <button class="back-btn" id="backBtn">Back</button>
        </div>

        <p class="status" id="status"></p>
    </div>

    <div id="waitingRoom">
        <div class="waiting-content">
            <div class="waiting-title">⚔️ Game Room</div>
            <div class="room-code" id="roomCodeDisplay"></div>
            <div class="waiting-status" id="waitingStatus"></div>
            <button id="startBtn">Start Game</button>
        </div>
    </div>

    <div id="gameContainer" class="hidden">
        <canvas id="gameCanvas"></canvas>
        <div class="connection-status" id="connectionStatus">Offline</div>
        <div id="ui">
            <div class="healthContainer p1">
                <div class="playerName">Player 1</div>
                <div class="healthBar">
                    <div class="healthFill" id="health1" style="width: 100%"></div>
                </div>
                <div class="comboDisplay" id="combo1">Combo x2</div>
            </div>
            <div class="healthContainer p2">
                <div class="playerName">Player 2</div>
                <div class="healthBar">
                    <div class="healthFill" id="health2" style="width: 100%"></div>
                </div>
                <div class="comboDisplay" id="combo2">Combo x2</div>
            </div>
        </div>
        <div id="countdown"></div>
        <div id="startText">FIGHT!</div>
        <div id="overlay">
            <div id="winnerText">Player 1 Wins!</div>
            <div class="match-info" id="matchInfo"></div>
            <div class="button-group-overlay">
                <button id="playAgainBtn">Play Again</button>
                <button id="quitBtn">Return to Lobby</button>
            </div>
            <div id="opponentStatus"></div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://sword-duel-server.onrender.com';
        
        let socket = null;
        let isHost = false;
        let isConnected = false;
        let roomCode = null;
        let myPlayerId = null;
        let gameMode = 'offline';
        let rematchReady = false;
        let opponentRematchReady = false;

        const lobby = document.getElementById('lobby');
        const waitingRoom = document.getElementById('waitingRoom');
        const gameContainer = document.getElementById('gameContainer');
        const hostBtn = document.getElementById('hostBtn');
        const joinBtn = document.getElementById('joinBtn');
        const joinForm = document.getElementById('joinForm');
        const codeInput = document.getElementById('codeInput');
        const connectBtn = document.getElementById('connectBtn');
        const backBtn = document.getElementById('backBtn');
        const status = document.getElementById('status');
        const mainButtons = document.getElementById('mainButtons');
        const connectionStatus = document.getElementById('connectionStatus');
        const startBtn = document.getElementById('startBtn');
        const waitingStatus = document.getElementById('waitingStatus');
        const roomCodeDisplay = document.getElementById('roomCodeDisplay');

        function showStatus(text, isError = false) {
            status.textContent = text;
            status.style.color = isError ? '#ff6b6b' : 'rgba(255, 255, 255, 0.8)';
        }

        function generateCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        function returnToLobby() {
            player1Wins = 0;
            player2Wins = 0;
            rematchReady = false;
            opponentRematchReady = false;
            gameContainer.classList.add('hidden');
            waitingRoom.classList.remove('active');
            lobby.classList.remove('hidden');
            gameMode = 'offline';
            if (socket) socket.disconnect();
            hostBtn.disabled = false;
            joinBtn.disabled = false;
            codeInput.value = '';
            mainButtons.style.display = 'flex';
            joinForm.classList.remove('active');
        }

        function connectToServer() {
            if (socket) {
                socket.disconnect();
            }
            
            socket = io(SERVER_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000
            });

            socket.on('connect', () => {
                console.log('Connected to server');
                isConnected = true;
                connectionStatus.textContent = 'Connected';
                connectionStatus.classList.remove('disconnected');
            });

            socket.on('disconnect', () => {
                console.log('Disconnected from server');
                isConnected = false;
                if (gameMode === 'online') {
                    connectionStatus.textContent = 'Disconnected';
                    connectionStatus.classList.add('disconnected');
                }
            });

            socket.on('connect_error', (error) => {
                console.log('Connection error:', error);
                showStatus('Failed to connect to server', true);
                isConnected = false;
                hostBtn.disabled = false;
                joinBtn.disabled = false;
            });

            socket.on('room_created', (data) => {
                roomCode = data.code;
                isHost = true;
                myPlayerId = 1;
                gameMode = 'online';
                
                lobby.classList.add('hidden');
                waitingRoom.classList.add('active');
                roomCodeDisplay.textContent = roomCode;
                waitingStatus.textContent = 'Waiting for opponent to join...';
                startBtn.style.display = 'none';
            });

            socket.on('room_joined', (data) => {
                roomCode = data.code;
                isHost = false;
                myPlayerId = 2;
                gameMode = 'online';
                
                lobby.classList.add('hidden');
                waitingRoom.classList.add('active');
                roomCodeDisplay.textContent = roomCode;
                waitingStatus.textContent = 'Connected! Waiting for host to start...';
                startBtn.style.display = 'none';
            });

            socket.on('player_joined', () => {
                if (isHost) {
                    waitingStatus.textContent = 'Player joined! Ready to start?';
                    startBtn.style.display = 'block';
                }
            });

            socket.on('game_start', () => {
                startGame();
            });

            socket.on('player_left', () => {
                returnToLobby();
            });

            socket.on('game_state', (data) => {
                updateGameState(data);
            });

            socket.on('game_over', (data) => {
                if (!gameOver) {
                    handleGameOver(data.winner);
                }
            });

            socket.on('rematch_ready', () => {
                opponentRematchReady = true;
                updateOpponentStatus();
                if (rematchReady && opponentRematchReady) {
                    resetGameState();
                    startCountdown();
                }
            });

            socket.on('return_lobby', () => {
                returnToLobby();
            });

            socket.on('error', (data) => {
                showStatus(data.message || 'An error occurred', true);
            });

            socket.on('full', () => {
                showStatus('Room is full', true);
                connectBtn.disabled = false;
                backBtn.disabled = false;
            });

            socket.on('not_found', () => {
                showStatus('Room not found', true);
                connectBtn.disabled = false;
                backBtn.disabled = false;
            });
        }

        hostBtn.addEventListener('click', () => {
            hostBtn.disabled = true;
            joinBtn.disabled = true;
            showStatus('Connecting to server...');
            connectToServer();
            
            const checkConnection = setInterval(() => {
                if (isConnected) {
                    clearInterval(checkConnection);
                    const code = generateCode();
                    socket.emit('create_room', { code });
                }
            }, 100);
            
            setTimeout(() => {
                clearInterval(checkConnection);
                if (!isConnected) {
                    showStatus('Failed to connect. Server may be down.', true);
                    hostBtn.disabled = false;
                    joinBtn.disabled = false;
                }
            }, 5000);
        });

        joinBtn.addEventListener('click', () => {
            mainButtons.style.display = 'none';
            joinForm.classList.add('active');
            codeInput.focus();
            showStatus('');
        });

        backBtn.addEventListener('click', () => {
            joinForm.classList.remove('active');
            mainButtons.style.display = 'flex';
            hostBtn.disabled = false;
            joinBtn.disabled = false;
            codeInput.value = '';
            showStatus('');
            if (socket) {
                socket.disconnect();
                socket = null;
            }
        });

        connectBtn.addEventListener('click', () => {
            const code = codeInput.value.trim();
            if (code.length !== 4 || !/^\d{4}$/.test(code)) {
                showStatus('Please enter a valid 4-digit code', true);
                return;
            }
            
            connectBtn.disabled = true;
            backBtn.disabled = true;
            showStatus('Connecting to server...');
            connectToServer();
            
            const checkConnection = setInterval(() => {
                if (isConnected) {
                    clearInterval(checkConnection);
                    socket.emit('join_room', { code });
                }
            }, 100);
            
            setTimeout(() => {
                clearInterval(checkConnection);
                if (!isConnected) {
                    showStatus('Failed to connect. Server may be down.', true);
                    connectBtn.disabled = false;
                    backBtn.disabled = false;
                }
            }, 5000);
        });

        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                connectBtn.click();
            }
        });

        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            waitingStatus.textContent = 'Starting game...';
            if (socket) {
                socket.emit('start_game', { room: roomCode });
            }
            setTimeout(() => {
                startGame();
            }, 500);
        });

        function startGame() {
            waitingRoom.classList.remove('active');
            gameContainer.classList.remove('hidden');
            initGame();
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let WIDTH = window.innerWidth;
        let HEIGHT = window.innerHeight;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        const WORLD_WIDTH = 3000;
        const WORLD_HEIGHT = 1200;
        const GROUND = WORLD_HEIGHT - 100;
        const GRAVITY = 0.6;
        const FRICTION = 0.88;
        const WALL_FRICTION = 0.85;
        const WALL_JUMP_BONUS = -14;
        const PLAYER_MARGIN = 50;

        const camera = {
            x: WORLD_WIDTH / 2,
            y: WORLD_HEIGHT / 2,
            zoom: 1,
            targetZoom: 1
        };

        let player1Wins = 0;
        let player2Wins = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration, volume = 0.3) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playHitSound() {
            playSound(180, 'square', 0.1, 0.4);
            playSound(120, 'sawtooth', 0.15, 0.3);
        }

        function playCritSound() {
            playSound(350, 'square', 0.15, 0.5);
            playSound(250, 'sawtooth', 0.25, 0.4);
            setTimeout(() => playSound(500, 'square', 0.2, 0.4), 80);
        }

        function playCountdown() {
            playSound(440, 'sine', 0.15, 0.4);
        }

        function playFightSound() {
            playSound(600, 'sine', 0.2, 0.5);
            setTimeout(() => playSound(800, 'sine', 0.3, 0.5), 100);
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.alpha = 1;
                this.scale = 0;
                this.vy = -4;
            }

            update() {
                this.y += this.vy;
                this.vy *= 0.92;
                this.alpha -= 0.015;
                if (this.scale < 1) this.scale += 0.12;
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.font = `bold ${28 * this.scale}px Arial`;
                ctx.fillStyle = this.color;
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 6;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.5) * 12 - 4;
                this.color = color;
                this.alpha = 1;
                this.size = Math.random() * 6 + 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.25;
                this.alpha -= 0.025;
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function drawCrown(ctx, x, y, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            
            ctx.fillStyle = '#ffd700';
            ctx.strokeStyle = '#b8860b';
            ctx.lineWidth = 2;
            
            ctx.fillRect(-16, 0, 32, 8);
            ctx.fillRect(-16, 8, 4, 12);
            ctx.fillRect(-12, 4, 8, 4);
            ctx.fillRect(-4, -8, 8, 4);
            ctx.fillRect(4, 4, 8, 4);
            ctx.fillRect(12, 8, 4, 12);
            
            ctx.fillRect(-14, -2, 4, 4);
            ctx.fillRect(-2, -12, 4, 4);
            ctx.fillRect(10, -2, 4, 4);
            
            ctx.restore();
        }

        function drawScoreCrown(ctx, wins, isLeft) {
            ctx.save();
            
            const crownX = isLeft ? 50 : WIDTH - 50;
            const textX = isLeft ? 80 : WIDTH - 80;
            
            drawCrown(ctx, crownX, 50, 1.5);
            
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = '#fff';
            ctx.textAlign = isLeft ? 'left' : 'right';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(wins.toString(), textX, 65);
            
            ctx.restore();
        }

        class Player {
            constructor(x, color, controls, facingRight) {
                this.x = x;
                this.y = GROUND;
                this.width = 50;
                this.height = 80;
                this.vx = 0;
                this.vy = 0;
                this.color = color;
                this.health = 100;
                this.maxHealth = 100;
                this.controls = controls;
                this.facingRight = facingRight;
                this.grounded = true;
                this.attacking = false;
                this.attackCooldown = 0;
                this.attackDuration = 0;
                this.attackWidth = 70;
                this.attackHeight = 50;
                this.combo = 0;
                this.comboTimer = 0;
                this.lastHitTime = 0;
                this.hitStun = 0;
                this.jumpCount = 0;
                this.maxJumps = 2;
                this.canCrit = false;
                this.critGlow = 0;
                this.onWall = false;
                this.wallSide = 0;
                this.canWallJump = true;
                this.jumpPressed = false;
            }

            update(keys, other, isLocal) {
                if (this.hitStun > 0) {
                    this.hitStun--;
                    this.vx *= 0.92;
                }

                if (this.vy > 2) {
                    this.canCrit = true;
                    this.critGlow = Math.min(1, this.critGlow + 0.1);
                } else {
                    this.canCrit = false;
                    this.critGlow = Math.max(0, this.critGlow - 0.1);
                }

                const onLeftWall = this.x <= PLAYER_MARGIN;
                const onRightWall = this.x >= WORLD_WIDTH - PLAYER_MARGIN;
                
                this.onWall = (onLeftWall || onRightWall) && !this.grounded && this.vy > 0;
                this.wallSide = onLeftWall ? -1 : (onRightWall ? 1 : 0);

                if (this.onWall) {
                    this.vx *= WALL_FRICTION;
                    this.canCrit = false;
                }

                if (isLocal) {
                    if (keys[this.controls.left]) {
                        this.vx -= 1.4;
                        this.facingRight = false;
                        if (this.onWall && this.wallSide === 1) {
                            this.canWallJump = false;
                        }
                    }
                    if (keys[this.controls.right]) {
                        this.vx += 1.4;
                        this.facingRight = true;
                        if (this.onWall && this.wallSide === -1) {
                            this.canWallJump = false;
                        }
                    }

                    if (keys[this.controls.jump] && !this.jumpPressed) {
                        if (this.grounded) {
                            this.vy = -16;
                            this.grounded = false;
                            this.jumpCount = 1;
                            this.canWallJump = true;
                            playSound(300, 'sine', 0.1, 0.2);
                        } else if (this.jumpCount < this.maxJumps) {
                            if (this.onWall && this.canWallJump) {
                                this.vy = WALL_JUMP_BONUS;
                                this.vx = -this.wallSide * 10;
                                this.facingRight = this.wallSide === -1;
                                this.canWallJump = false;
                                this.jumpCount = 1;
                                playSound(300, 'sine', 0.1, 0.2);
                            } else {
                                this.vy = -16;
                                this.jumpCount++;
                                playSound(300, 'sine', 0.1, 0.2);
                            }
                        }
                        this.jumpPressed = true;
                    }
                    if (!keys[this.controls.jump]) {
                        this.jumpPressed = false;
                    }

                    if (keys[this.controls.attack] && this.attackCooldown <= 0 && !this.attacking) {
                        this.attacking = true;
                        this.attackDuration = 12;
                        this.attackCooldown = 25;
                    }
                }

                if (this.attacking) {
                    this.attackDuration--;
                    if (this.attackDuration <= 0) {
                        this.attacking = false;
                    }
                }

                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer <= 0) {
                        this.combo = 0;
                        updateComboDisplay();
                    }
                }

                this.vy += GRAVITY;

                if (this.grounded) {
                    this.vx *= FRICTION;
                } else {
                    this.vx *= 0.98;
                }

                this.vx = Math.max(-10, Math.min(10, this.vx));

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < PLAYER_MARGIN) {
                    this.x = PLAYER_MARGIN;
                    this.vx = 0;
                }
                if (this.x > WORLD_WIDTH - PLAYER_MARGIN) {
                    this.x = WORLD_WIDTH - PLAYER_MARGIN;
                    this.vx = 0;
                }

                if (this.y >= GROUND) {
                    this.y = GROUND;
                    this.vy = 0;
                    this.grounded = true;
                    this.jumpCount = 0;
                    this.canWallJump = true;
                }
            }

            getAttackBox() {
                const offsetX = this.facingRight ? this.width / 2 : -this.width / 2 - this.attackWidth;
                return {
                    x: this.x + offsetX,
                    y: this.y - this.height / 2 - 25,
                    width: this.attackWidth,
                    height: this.attackHeight
                };
            }

            takeDamage(amount, knockbackDir, isCrit, attackerY) {
                this.health = Math.max(0, this.health - amount);
                this.hitStun = 20;

                document.getElementById('health' + (this === player1 ? 1 : 2)).style.width = this.health + '%';

                if (isCrit) {
                    this.vx = knockbackDir * 4.5;
                    const heightDiff = this.y - attackerY;
                    this.vy = -13 - Math.min(Math.abs(heightDiff) * 0.12, 6);
                    screenShake = 15;
                } else {
                    this.vx = knockbackDir * 5;
                    this.vy = -8;
                }

                this.grounded = false;
                this.jumpCount = this.maxJumps;
            }

            draw(ctx) {
                ctx.save();
                
                const drawX = this.x - this.width / 2;
                const drawY = this.y - this.height;

                if (this.critGlow > 0) {
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 20 + this.critGlow * 30;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(drawX, drawY, this.width, this.height);
                    ctx.shadowBlur = 0;

                    const pulseAlpha = 0.3 + Math.sin(Date.now() * 0.015) * 0.2 * this.critGlow;
                    ctx.fillStyle = `rgba(255, 215, 0, ${pulseAlpha})`;
                    ctx.fillRect(drawX - 8, drawY - 8, this.width + 16, this.height + 16);
                }

                ctx.fillStyle = this.color;
                ctx.fillRect(drawX, drawY, this.width, this.height);

                ctx.fillStyle = this.darkenColor(this.color);
                ctx.fillRect(drawX, drawY + this.height * 0.65, this.width, this.height * 0.35);

                const eyeX = this.x + (this.facingRight ? 12 : -12);
                const eyeY = this.y - this.height * 0.72;
                ctx.fillStyle = 'white';
                ctx.fillRect(eyeX - 8, eyeY - 6, 16, 12);
                ctx.fillStyle = '#111';
                ctx.fillRect(eyeX + (this.facingRight ? 3 : -9), eyeY - 3, 8, 8);

                const swordX = this.x + (this.facingRight ? this.width / 2 : -this.width / 2);
                const swordY = this.y - this.height / 2;
                
                ctx.save();
                ctx.translate(swordX, swordY);
                ctx.rotate(this.facingRight ? 0.3 : -0.3);
                
                if (this.attacking) {
                    ctx.rotate(this.facingRight ? -0.8 : 0.8);
                }
                
                ctx.fillStyle = '#888';
                const swordLen = 55;
                ctx.fillRect(0, -6, this.facingRight ? swordLen : -swordLen, 12);
                ctx.fillStyle = '#bbb';
                ctx.fillRect(this.facingRight ? swordLen - 5 : -swordLen + 5, -8, 15, 16);
                ctx.fillStyle = '#654321';
                ctx.fillRect(this.facingRight ? 8 : -18, -9, 22, 18);
                
                ctx.restore();

                if (this.attacking) {
                    const attackBox = this.getAttackBox();
                    ctx.fillStyle = 'rgba(255, 255, 0, 0.25)';
                    ctx.fillRect(attackBox.x, attackBox.y, attackBox.width, attackBox.height);
                }

                ctx.restore();
            }

            darkenColor(color) {
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                return `rgb(${Math.floor(r * 0.65)}, ${Math.floor(g * 0.65)}, ${Math.floor(b * 0.65)})`;
            }
        }

        let player1, player2;
        const floatingTexts = [];
        const particles = [];
        const keys = {};
        let gameOver = false;
        let gameStarted = false;
        let screenShake = 0;
        let lastStateSend = 0;

            player1.facingRight = true;
            player1.attacking = false;

            player1.hitStun = 0;
            player1.jumpCount = 0;

        function updateGameState(data) {
            if (!player1 || !player2 || !gameStarted || gameOver) return;
            
            const targetPlayer = myPlayerId === 1 ? player2 : player1;
            targetPlayer.x = data.x;
            targetPlayer.y = data.y;
            targetPlayer.vx = data.vx;
            targetPlayer.vy = data.vy;
            targetPlayer.facingRight = data.facingRight;
            targetPlayer.attacking = data.attacking;
            targetPlayer.attackDuration = data.attackDuration;
            targetPlayer.health = data.health;
            targetPlayer.canCrit = data.canCrit;
            targetPlayer.critGlow = data.critGlow;
            targetPlayer.grounded = data.grounded;
            
            const healthEl = document.getElementById(myPlayerId === 1 ? 'health2' : 'health1');
            healthEl.style.width = targetPlayer.health + '%';
        }

        function sendGameState() {
            if (!socket || !isConnected || !gameStarted || gameOver) return;
            
            const now = Date.now();
            if (now - lastStateSend < 50) return;
            lastStateSend = now;
            
            const myState = myPlayerId === 1 ? player1 : player2;
            
            socket.emit('game_state', {
                x: myState.x,
                y: myState.y,
                vx: myState.vx,
                vy: myState.vy,
                facingRight: myState.facingRight,
                attacking: myState.attacking,
                attackDuration: myState.attackDuration,
                health: myState.health,
                canCrit: myState.canCrit,
                critGlow: myState.critGlow,
                grounded: myState.grounded
            });
        }

        function updateOpponentStatus() {
            const statusEl = document.getElementById('opponentStatus');
            if (opponentRematchReady) {
                statusEl.textContent = '✓ Opponent is ready!';
                statusEl.style.color = '#4CAF50';
            } else {
                statusEl.textContent = 'Waiting for opponent...';
                statusEl.style.color = 'rgba(255, 255, 255, 0.7)';
            }
        }

        function handleGameOver(winner) {
            endGame(winner);
        }

        function updateCamera() {
            const viewWidth = WIDTH / camera.zoom;
            const viewHeight = HEIGHT / camera.zoom;
            
            const minX = Math.min(player1.x, player2.x) - 100;
            const maxX = Math.max(player1.x, player2.x) + 100;
            const worldSpan = maxX - minX;
            
            let targetX = (player1.x + player2.x) / 2;
            let targetY = (player1.y + player2.y) / 2;

            const halfViewW = viewWidth / 2;
            const minCamX = halfViewW;
            const maxCamX = WORLD_WIDTH - halfViewW;
            targetX = Math.max(minCamX, Math.min(maxCamX, targetX));

            const halfViewH = viewHeight / 2;
            const minCamY = halfViewH;
            const maxCamY = WORLD_HEIGHT - halfViewH;
            targetY = Math.max(minCamY, Math.min(maxCamY, targetY));

            camera.x += (targetX - camera.x) * 0.08;
            camera.y += (targetY - camera.y) * 0.05;

            const idealZoom = Math.max(0.5, Math.min(1.2, 800 / worldSpan));
            camera.targetZoom = idealZoom;
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.05;
        }

        function updateComboDisplay() {
            if (!player1 || !player2) return;
            
            const combo1El = document.getElementById('combo1');
            const combo2El = document.getElementById('combo2');
            
            combo1El.style.opacity = player1.combo >= 2 ? '1' : '0';
            combo2El.style.opacity = player2.combo >= 2 ? '1' : '0';
            
            if (player1.combo >= 2) combo1El.textContent = `Combo x${player1.combo}`;
            if (player2.combo >= 2) combo2El.textContent = `Combo x${player2.combo}`;
        }

        function checkAttackHit(attacker, defender, isLocal) {
            if (!attacker.attacking || attacker.attackDuration < 6) return;

            const attackBox = attacker.getAttackBox();
            const defenderBox = {
                x: defender.x - defender.width / 2,
                y: defender.y - defender.height,
                width: defender.width,
                height: defender.height
            };

            if (attackBox.x < defenderBox.x + defenderBox.width &&
                attackBox.x + attackBox.width > defenderBox.x &&
                attackBox.y < defenderBox.y + defenderBox.height &&
                attackBox.y + attackBox.height > defenderBox.y) {

                const now = Date.now();
                if (now - attacker.lastHitTime > 180) {
                    attacker.lastHitTime = now;
                    
                    attacker.combo++;
                    attacker.comboTimer = 150;
                    updateComboDisplay();

                    const isCrit = attacker.canCrit;
                    let damage = 10;
                    
                    if (attacker.combo >= 2) {
                        damage += 5 * (attacker.combo - 1);
                    }
                    
                    if (isCrit) {
                        damage *= 2.5;
                        playCritSound();
                        floatingTexts.push(new FloatingText(
                            defender.x,
                            defender.y - defender.height - 30,
                            'CRITICAL!',
                            '#ffd700'
                        ));
                    } else {
                        playHitSound();
                    }

                    const knockbackDir = attacker.facingRight ? 1 : -1;
                    defender.takeDamage(damage, knockbackDir, isCrit, attacker.y);

                    floatingTexts.push(new FloatingText(
                        defender.x,
                        defender.y - defender.height - 70,
                        `-${Math.floor(damage)}`,
                        isCrit ? '#ffd700' : '#ff4444'
                    ));

                    for (let i = 0; i < (isCrit ? 20 : 10); i++) {
                        particles.push(new Particle(
                            defender.x + (Math.random() - 0.5) * 30,
                            defender.y - defender.height / 2,
                            isCrit ? '#ffd700' : '#ff6b6b'
                        ));
                    }

                    if (isLocal && socket && isConnected) {
                        socket.emit('attack_hit', {
                            damage: damage,
                            isCrit: isCrit,
                            defenderHealth: defender.health
                        });
                    }

                    if (defender.health <= 0 && !gameOver) {
                        endGame(attacker === player1 ? 1 : 2);
                    }
                }
            }
        }

        function endGame(winner) {
            if (gameOver) return;
            gameOver = true;
            
            if (winner === 1) {
                player1Wins++;
                playSound(400, 'sine', 0.3, 0.4);
                setTimeout(() => playSound(500, 'sine', 0.3, 0.4), 150);
                setTimeout(() => playSound(600, 'sine', 0.5, 0.4), 300);
            } else if (winner === 2) {
                player2Wins++;
                playSound(400, 'sine', 0.3, 0.4);
                setTimeout(() => playSound(500, 'sine', 0.3, 0.4), 150);
                setTimeout(() => playSound(600, 'sine', 0.5, 0.4), 300);
            }

            if (socket && isConnected) {
                socket.emit('game_over', { winner });
            }

            const overlay = document.getElementById('overlay');
            const winnerText = document.getElementById('winnerText');
            const matchInfo = document.getElementById('matchInfo');
            const buttonGroup = document.querySelector('.button-group-overlay');
            const playAgainBtn = document.getElementById('playAgainBtn');
            const quitBtn = document.getElementById('quitBtn');
            
            winnerText.textContent = `Player ${winner} Wins Round!`;
            winnerText.style.color = winner === 1 ? '#4a9eff' : '#ff6b6b';
            matchInfo.textContent = `${player1Wins} - ${player2Wins}`;
            
            // Check if match is over (first to 3 wins)
            if (player1Wins >= 3 || player2Wins >= 3) {
                winnerText.textContent = player1Wins >= 3 ? 'Player 1 Wins the Match!' : 'Player 2 Wins the Match!';
                matchInfo.textContent = `Final Score: ${player1Wins} - ${player2Wins}`;
                playAgainBtn.textContent = 'Play Again';
                playAgainBtn.classList.remove('ready');
                buttonGroup.classList.add('active');
            } else {
                buttonGroup.classList.remove('active');
            }
            
            overlay.classList.add('active');
        }

        function startCountdown() {
            const countdownEl = document.getElementById('countdown');
            const startTextEl = document.getElementById('startText');
            
            countdownEl.style.display = 'block';
            let count = 3;
            
            function tick() {
                if (count > 0) {
                    countdownEl.textContent = count;
                    countdownEl.style.opacity = '1';
                    countdownEl.style.transform = 'translate(-50%, -50%) scale(1.2)';
                    playCountdown();
                    
                    setTimeout(() => {
                        countdownEl.style.opacity = '0';
                        countdownEl.style.transform = 'translate(-50%, -50%) scale(0.8)';
                    }, 400);
                    
                    count--;
                    setTimeout(tick, 700);
                } else {
                    countdownEl.style.display = 'none';
                    startTextEl.style.display = 'block';
                    startTextEl.style.opacity = '1';
                    playFightSound();
                    gameStarted = true;
                    setTimeout(() => {
                        startTextEl.style.opacity = '0';
                        startTextEl.style.display = 'none';
                    }, 400);
                }
            }
            
            tick();
        }

        document.getElementById('playAgainBtn').addEventListener('click', () => {
            if (player1Wins >= 3 || player2Wins >= 3) {
                // Match is over
                const playAgainBtn = document.getElementById('playAgainBtn');
                if (!rematchReady) {
                    rematchReady = true;
                    playAgainBtn.textContent = '✓ Ready!';
                    playAgainBtn.classList.add('ready');
                    playAgainBtn.disabled = true;
                    
                    if (socket && isConnected) {
                        socket.emit('rematch_ready', { room: roomCode });
                    }
                    
                    updateOpponentStatus();
                    document.getElementById('opponentStatus').style.display = 'block';
                }
            }
        });

        document.getElementById('quitBtn').addEventListener('click', () => {
            if (socket && isConnected) {
                socket.emit('return_lobby', { room: roomCode });
            }
            returnToLobby();
        });

        function drawArena() {
            ctx.fillStyle = '#3d3d3d';
            ctx.fillRect(0, GROUND, WORLD_WIDTH, WORLD_HEIGHT - GROUND);
            
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, GROUND, WORLD_WIDTH, 20);
            
            ctx.fillStyle = '#636e72';
            for (let i = 0; i < WORLD_WIDTH; i += 40) {
                ctx.fillRect(i, GROUND, 30, 8);
            }

            ctx.fillStyle = '#222';
            ctx.fillRect(0, WORLD_HEIGHT - 30, WORLD_WIDTH, 30);
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, WORLD_HEIGHT);
            grad.addColorStop(0, '#0a0a15');
            grad.addColorStop(0.5, '#0f0f23');
            grad.addColorStop(0.7, '#16213e');
            grad.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            for (let i = 0; i < 150; i++) {
                const x = (i * 137) % WORLD_WIDTH;
                const y = (i * 89) % (GROUND - 100);
                const size = (i % 3) + 1;
                const twinkle = Math.sin(Date.now() * 0.002 + i) * 0.3 + 0.7;
                ctx.globalAlpha = twinkle * 0.6;
                ctx.fillRect(x, y, size, size);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            if (!player1 || !player2) {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            WIDTH = window.innerWidth;
            HEIGHT = window.innerHeight;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;

            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            ctx.save();
            
            if (screenShake > 0) {
                const shakeX = (Math.random() - 0.5) * screenShake;
                const shakeY = (Math.random() - 0.5) * screenShake;
                ctx.translate(shakeX, shakeY);
                screenShake *= 0.9;
                if (screenShake < 0.5) screenShake = 0;
            }

            updateCamera();
            ctx.translate(WIDTH / 2, HEIGHT / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            drawBackground();
            drawArena();

            if (gameStarted && !gameOver) {
                const myPlayer = myPlayerId === 1 ? player1 : player2;
                const otherPlayer = myPlayerId === 1 ? player2 : player1;
                
                myPlayer.update(keys, otherPlayer, true);
                otherPlayer.update({}, myPlayer, false);

                checkAttackHit(player1, player2, myPlayerId === 1);
                checkAttackHit(player2, player1, myPlayerId === 2);
                
                sendGameState();
            }

            player1.draw(ctx);
            player2.draw(ctx);

            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw(ctx);
                }
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                if (!floatingTexts[i].update()) {
                    floatingTexts.splice(i, 1);
                } else {
                    floatingTexts[i].draw(ctx);
                }
            }

            ctx.restore();

            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            drawScoreCrown(ctx, player1Wins, true);
            drawScoreCrown(ctx, player2Wins, false);
            ctx.restore();

            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        window.addEventListener('resize', () => {
            WIDTH = window.innerWidth;
            HEIGHT = window.innerHeight;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        });
    </script>
</body>
</html>
