<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1v1 Sword Fight</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #lobby {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 1000;
        }

        #lobby.hidden {
            display: none;
        }

        .title {
            font-size: 72px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #4a9eff, 0 0 40px #4a9eff;
            margin-bottom: 60px;
            text-align: center;
        }

        .subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 200px;
        }

        .btn-host {
            background: linear-gradient(to bottom, #4CAF50, #45a049);
            color: white;
        }

        .btn-join {
            background: linear-gradient(to bottom, #4a9eff, #3d8bdf);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .join-form {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .join-form.active {
            display: flex;
        }

        .code-input {
            padding: 15px 30px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            border: 3px solid #4a9eff;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 200px;
            outline: none;
        }

        .code-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .status {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
            min-height: 30px;
        }

        .back-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        #waitingRoom {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        #waitingRoom.active {
            display: flex;
        }

        .waiting-content {
            text-align: center;
        }

        .waiting-title {
            font-size: 48px;
            font-weight: bold;
            color: #4a9eff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #4a9eff;
        }

        .room-code {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 5px;
        }

        .waiting-status {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        #startBtn {
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(to bottom, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(76, 175, 80, 0.6);
        }

        #startBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #gameContainer.hidden {
            display: none;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #16213e 0%, #1a1a2e 100%);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            gap: 100px;
            pointer-events: none;
            z-index: 10;
        }

        .healthContainer {
            width: 280px;
        }

        .playerName {
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .p1 .playerName { color: #4a9eff; }
        .p2 .playerName { color: #ff6b6b; text-align: right; }

        .healthBar {
            width: 100%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .healthFill {
            height: 100%;
            transition: width 0.15s ease;
            border-radius: 12px;
        }

        .p1 .healthFill {
            background: linear-gradient(to bottom, #6db3f2, #4a9eff);
        }

        .p2 .healthFill {
            background: linear-gradient(to bottom, #ff8a8a, #ff6b6b);
            float: right;
        }

        .comboDisplay {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .p2 .comboDisplay { text-align: right; }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #overlay.active {
            display: flex;
        }

        #winnerText {
            color: white;
            font-size: 64px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .match-score {
            color: #ffd700;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        #rematchBtn {
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(to bottom, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        #rematchBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        #rematchBtn.ready {
            background: linear-gradient(to bottom, #ffd700, #ffed4e);
            color: #000;
        }

        #quitBtn {
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(to bottom, #ff6b6b, #ff5555);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        #quitBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        #opponentStatus {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-top: 20px;
            min-height: 25px;
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px #ffd700, 0 0 60px #ffd700;
            z-index: 50;
            display: none;
            opacity: 0;
        }

        #startText {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #4CAF50, 0 0 40px #4CAF50;
            z-index: 50;
            display: none;
            opacity: 0;
        }

        .connection-status {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            color: #4CAF50;
            font-size: 14px;
            z-index: 10;
        }

        .connection-status.disconnected {
            color: #ff6b6b;
        }

        .connection-status.waiting {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div id="lobby">
        <h1 class="title">⚔️ Sword Duel</h1>
        <p class="subtitle">2-Player Online Combat</p>
        
        <div class="button-group" id="mainButtons">
            <button class="btn btn-host" id="hostBtn">Host Game</button>
            <button class="btn btn-join" id="joinBtn">Join Game</button>
        </div>

        <div class="join-form" id="joinForm">
            <input type="text" class="code-input" id="codeInput" placeholder="0000" maxlength="4" />
            <button class="btn btn-join" id="connectBtn">Connect</button>
            <button class="back-btn" id="backBtn">Back</button>
        </div>

        <p class="status" id="status"></p>
    </div>

    <div id="waitingRoom">
        <div class="waiting-content">
            <div class="waiting-title">⚔️ Game Room</div>
            <div class="room-code" id="roomCodeDisplay"></div>
            <div class="waiting-status" id="waitingStatus"></div>
            <button id="startBtn" style="display: none;">Start Game</button>
        </div>
    </div>

    <div id="gameContainer" class="hidden">
        <canvas id="gameCanvas"></canvas>
        <div class="connection-status" id="connectionStatus">Offline</div>
        <div id="ui">
            <div class="healthContainer p1">
                <div class="playerName">Player 1</div>
                <div class="healthBar">
                    <div class="healthFill" id="health1" style="width: 100%"></div>
                </div>
                <div class="comboDisplay" id="combo1">Combo x2</div>
            </div>
            <div class="healthContainer p2">
                <div class="playerName">Player 2</div>
                <div class="healthBar">
                    <div class="healthFill" id="health2" style="width: 100%"></div>
                </div>
                <div class="comboDisplay" id="combo2">Combo x2</div>
            </div>
        </div>
        <div id="countdown"></div>
        <div id="startText">FIGHT!</div>
        <div id="overlay">
            <div id="winnerText">Player 1 Wins!</div>
            <div class="match-score" id="matchScore"></div>
            <div class="button-container">
                <button id="rematchBtn">Rematch</button>
                <button id="quitBtn">Quit</button>
            </div>
            <div id="opponentStatus"></div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://sword-duel-server.onrender.com';
        
        let socket = null;
        let isHost = false;
        let isConnected = false;
        let roomCode = null;
        let myPlayerId = null;
        let gameMode = 'offline';
        let rematchReady = false;
        let opponentRematchReady = false;

        const lobby = document.getElementById('lobby');
        const waitingRoom = document.getElementById('waitingRoom');
        const gameContainer = document.getElementById('gameContainer');
        const hostBtn = document.getElementById('hostBtn');
        const joinBtn = document.getElementById('joinBtn');
        const joinForm = document.getElementById('joinForm');
        const codeInput = document.getElementById('codeInput');
        const connectBtn = document.getElementById('connectBtn');
        const backBtn = document.getElementById('backBtn');
        const status = document.getElementById('status');
        const mainButtons = document.getElementById('mainButtons');
        const connectionStatus = document.getElementById('connectionStatus');
        const startBtn = document.getElementById('startBtn');
        const waitingStatus = document.getElementById('waitingStatus');
        const roomCodeDisplay = document.getElementById('roomCodeDisplay');

        function showStatus(text, isError = false) {
            status.textContent = text;
            status.style.color = isError ? '#ff6b6b' : 'rgba(255, 255, 255, 0.8)';
        }

        function generateCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        function connectToServer() {
            if (socket) {
                socket.disconnect();
            }
            
            socket = io(SERVER_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000
            });

            socket.on('connect', () => {
                console.log('Connected to server');
                isConnected = true;
                connectionStatus.textContent = 'Connected';
                connectionStatus.classList.remove('disconnected');
            });

            socket.on('disconnect', () => {
                console.log('Disconnected from server');
                isConnected = false;
                if (gameMode === 'online') {
                    connectionStatus.textContent = 'Disconnected';
                    connectionStatus.classList.add('disconnected');
                }
            });

            socket.on('connect_error', (error) => {
                console.log('Connection error:', error);
                showStatus('Failed to connect to server', true);
                isConnected = false;
                hostBtn.disabled = false;
                joinBtn.disabled = false;
            });

            socket.on('room_created', (data) => {
                roomCode = data.code;
                isHost = true;
                myPlayerId = 1;
                gameMode = 'online';
                
                lobby.classList.add('hidden');
                waitingRoom.classList.add('active');
                roomCodeDisplay.textContent = roomCode;
                waitingStatus.textContent = 'Waiting for opponent to join...';
                startBtn.style.display = 'none';
            });

            socket.on('room_joined', (data) => {
                roomCode = data.code;
                isHost = false;
                myPlayerId = 2;
                gameMode = 'online';
                
                lobby.classList.add('hidden');
                waitingRoom.classList.add('active');
                roomCodeDisplay.textContent = roomCode;
                waitingStatus.textContent = 'Connected! Waiting for host to start...';
                startBtn.style.display = 'none';
            });

            socket.on('player_joined', () => {
                if (isHost) {
                    waitingStatus.textContent = 'Player joined! Ready to start?';
                    startBtn.style.display = 'block';
                }
            });

            socket.on('game_start', () => {
                startGame();
            });

            socket.on('player_left', () => {
                showStatus('Other player left the game');
                connectionStatus.textContent = 'Opponent left';
                connectionStatus.classList.add('disconnected');
                if (!gameOver) {
                    endGame(0);
                }
            });

            socket.on('game_state', (data) => {
                if (data.playerId === 1 && myPlayerId === 2) {
                    player1.x = data.x;
                    player1.y = data.y;
                    player1.vx = data.vx;
                    player1.vy = data.vy;
                    player1.health = data.health;
                    player1.attacking = data.attacking;
                    player1.facingRight = data.facingRight;
                } else if (data.playerId === 2 && myPlayerId === 1) {
                    player2.x = data.x;
                    player2.y = data.y;
                    player2.vx = data.vx;
                    player2.vy = data.vy;
                    player2.health = data.health;
                    player2.attacking = data.attacking;
                    player2.facingRight = data.facingRight;
                }
            });

            socket.on('game_over', (data) => {
                if (!gameOver) {
                    handleGameOver(data.winner);
                }
            });

            socket.on('rematch_ready', () => {
                opponentRematchReady = true;
                updateOpponentStatus();
                if (rematchReady) {
                    startNewRound();
                }
            });

            socket.on('match_over', () => {
                returnToLobby();
            });

            socket.on('error', (data) => {
                showStatus(data.message || 'An error occurred', true);
            });

            socket.on('full', () => {
                showStatus('Room is full', true);
                connectBtn.disabled = false;
                backBtn.disabled = false;
            });

            socket.on('not_found', () => {
                showStatus('Room not found', true);
                connectBtn.disabled = false;
                backBtn.disabled = false;
            });
        }

        hostBtn.addEventListener('click', () => {
            hostBtn.disabled = true;
            joinBtn.disabled = true;
            showStatus('Connecting to server...');
            connectToServer();
            
            const checkConnection = setInterval(() => {
                if (isConnected) {
                    clearInterval(checkConnection);
                    const code = generateCode();
                    socket.emit('create_room', { code });
                }
            }, 100);
            
            setTimeout(() => {
                clearInterval(checkConnection);
                if (!isConnected) {
                    showStatus('Failed to connect. Server may be down.', true);
                    hostBtn.disabled = false;
                    joinBtn.disabled = false;
                }
            }, 5000);
        });

        joinBtn.addEventListener('click', () => {
            mainButtons.style.display = 'none';
            joinForm.classList.add('active');
            codeInput.focus();
            showStatus('');
        });

        backBtn.addEventListener('click', () => {
            joinForm.classList.remove('active');
            mainButtons.style.display = 'flex';
            hostBtn.disabled = false;
            joinBtn.disabled = false;
            codeInput.value = '';
            showStatus('');
            if (socket) {
                socket.disconnect();
                socket = null;
            }
        });

        connectBtn.addEventListener('click', () => {
            const code = codeInput.value.trim();
            if (code.length !== 4 || !/^\d{4}$/.test(code)) {
                showStatus('Please enter a valid 4-digit code', true);
                return;
            }
            
            connectBtn.disabled = true;
            backBtn.disabled = true;
            showStatus('Connecting to server...');
            connectToServer();
            
            const checkConnection = setInterval(() => {
                if (isConnected) {
                    clearInterval(checkConnection);
                    socket.emit('join_room', { code });
                }
            }, 100);
            
            setTimeout(() => {
                clearInterval(checkConnection);
                if (!isConnected) {
                    showStatus('Failed to connect. Server may be down.', true);
                    connectBtn.disabled = false;
                    backBtn.disabled = false;
                }
            }, 5000);
        });

        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                connectBtn.click();
            }
        });

        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            waitingStatus.textContent = 'Starting game...';
            if (socket) {
                socket.emit('start_game', { room: roomCode });
            }
            setTimeout(() => {
                startGame();
            }, 500);
        });

        function startGame() {
            waitingRoom.classList.remove('active');
            gameContainer.classList.remove('hidden');
            initGame();
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let WIDTH = window.innerWidth;
        let HEIGHT = window.innerHeight;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        const WORLD_WIDTH = 3000;
        const WORLD_HEIGHT = 1200;
        const GROUND = WORLD_HEIGHT - 100;
        const GRAVITY = 0.6;
        const FRICTION = 0.88;
        const WALL_FRICTION = 0.85;
        const WALL_JUMP_BONUS = -14;
        const PLAYER_MARGIN = 50;
        const MAX_WINS = 3;

        const camera = {
            x: WORLD_WIDTH / 2,
            y: WORLD_HEIGHT / 2,
            zoom: 1,
            targetZoom: 1
        };

        let player1Wins = 0;
        let player2Wins = 0;
        let lastWinner = null;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration, volume = 0.3) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playHitSound() {
            playSound(180, 'square', 0.1, 0.4);
            playSound(120, 'sawtooth', 0.15, 0.3);
        }

        function playCritSound() {
            playSound(350, 'square', 0.15, 0.5);
            playSound(250, 'sawtooth', 0.25, 0.4);
            setTimeout(() => playSound(500, 'square', 0.2, 0.4), 80);
        }

        function playCountdown() {
            playSound(440, 'sine', 0.15, 0.4);
        }

        function playFightSound() {
            playSound(600, 'sine', 0.2, 0.5);
            setTimeout(() => playSound(800, 'sine', 0.3, 0.5), 100);
        }

        function playDrawSound() {
            playSound(300, 'sine', 0.3, 0.4);
            setTimeout(() => playSound(300, 'sine', 0.3, 0.4), 200);
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.alpha = 1;
                this.scale = 0;
                this.vy = -4;
            }

            update() {
                this.y += this.vy;
                this.vy *= 0.92;
                this.alpha -= 0.015;
                if (this.scale < 1) this.scale += 0.12;
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.font = `bold ${28 * this.scale}px Arial`;
                ctx.fillStyle = this.color;
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 6;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.5) * 12 - 4;
                this.color = color;
                this.alpha = 1;
                this.size = Math.random() * 6 + 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.25;
                this.alpha -= 0.025;
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function drawCrown(ctx, x, y, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            
            ctx.fillStyle = '#ffd700';
            ctx.strokeStyle = '#b8860b';
            ctx.lineWidth = 2;
            
            ctx.fillRect(-16, 0, 32, 8);
            ctx.fillRect(-16, 8, 4, 12);
            ctx.fillRect(-12, 4, 8, 4);
            ctx.fillRect(-4, -8, 8, 4);
            ctx.fillRect(4, 4, 8, 4);
            ctx.fillRect(12, 8, 4, 12);
            
            ctx.fillRect(-14, -2, 4, 4);
            ctx.fillRect(-2, -12, 4, 4);
            ctx.fillRect(10, -2, 4, 4);
            
            ctx.restore();
        }

        function drawScoreCrown(ctx, wins, isLeft) {
            ctx.save();
            
            const crownX = isLeft ? 50 : WIDTH - 50;
            const textX = isLeft ? 80 : WIDTH - 80;
            
            drawCrown(ctx, crownX, 50, 1.5);
            
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = '#fff';
            ctx.textAlign = isLeft ? 'left' : 'right';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(wins.toString(), textX, 65);
            
            ctx.restore();
        }

        class Player {
            constructor(x, color, controls, facingRight) {
                this.x = x;
                this.y = GROUND;
                this.width = 50;
                this.height = 80;
                this.vx = 0;
                this.vy = 0;
                this.color = color;
                this.health = 100;
                this.maxHealth = 100;
                this.controls = controls;
                this.facingRight = facingRight;
                this.grounded = true;
                this.attacking = false;
                this.attackCooldown = 0;
                this.attackDuration = 0;
                this.attackWidth = 70;
                this.attackHeight = 50;
                this.combo = 0;
                this.comboTimer = 0;
                this.lastHitTime = 0;
                this.hitStun = 0;
                this.jumpCount = 0;
                this.maxJumps = 2;
                this.canCrit = false;
                this.critGlow = 0;
                this.onWall = false;
                this.wallSide = 0;
                this.canWallJump = true;
                this.jumpPressed = false;
            }

            update(keys, other, isLocal) {
                if (this.hitStun > 0) {
                    this.hitStun--;
                    this.vx *= 0.92;
                }

                if (this.vy > 2) {
                    this.canCrit = true;
                    this.critGlow = Math.min(1, this.critGlow + 0.1);
                } else {
                    this.canCrit = false;
                    this.critGlow = Math.max(0, this.critGlow - 0.1);
                }

                const onLeftWall = this.x <= PLAYER_MARGIN;
                const onRightWall = this.x >= WORLD_WIDTH - PLAYER_MARGIN;
                
                this.onWall = (onLeftWall || onRightWall) && !this.grounded && this.vy > 0;
                this.wallSide = onLeftWall ? -1 : (onRightWall ? 1 : 0);

                if (this.onWall) {
                    this.vx *= WALL_FRICTION;
                    this.canCrit = false;
                }

                if (isLocal) {
                    if (keys[this.controls.left]) {
                        this.vx -= 1.4;
                        this.facingRight = false;
                        if (this.onWall && this.wallSide === 1) {
                            this.canWallJump = false;
                        }
                    }
                    if (keys[this.controls.right]) {
                        this.vx += 1.4;
                        this.facingRight = true;
                        if (this.onWall && this.wallSide === -1) {
                            this.canWallJump = false;
                        }
                    }

                    if (keys[this.controls.jump] && !this.jumpPressed) {
                        if (this.grounded) {
                            this.vy = -16;
                            this.grounded = false;
                            this.jumpCount = 1;
                            this.canWallJump = true;
                            playSound(300, 'sine', 0.1, 0.2);
                        } else if (this.jumpCount < this.maxJumps) {
                            if (this.onWall && this.canWallJump) {
                                this.vy = WALL_JUMP_BONUS;
                                this.vx = -this.wallSide * 10;
                                this.facingRight = this.wallSide === -1;
                                this.canWallJump = false;
                                this.jumpCount = 1;
                                playSound(300, 'sine', 0.1, 0.2);
                            } else {
                                this.vy = -16;
                                this.jumpCount++;
                                playSound(300, 'sine', 0.1, 0.2);
                            }
                        }
                        this.jumpPressed = true;
                    }
                    if (!keys[this.controls.jump]) {
                        this.jumpPressed = false;
                    }

                    if (keys[this.controls.attack] && this.attackCooldown <= 0 && !this.attacking) {
                        this.attacking = true;
                        this.attackDuration = 12;
                        this.attackCooldown = 25;
                    }
                }

                if (this.attacking) {
                    this.attackDuration--;
                    if (this.attackDuration <= 0) {
                        this.attacking = false;
                    }
                }

                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer <= 0) {
                        this.combo = 0;
                        updateComboDisplay();
                    }
                }

                this.vy += GRAVITY;

                if (this.grounded) {
                    this.vx *= FRICTION;
                } else {
                    this.vx *= 0.98;
                }

                this.vx = Math.max(-10, Math.min(10, this.vx));

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < PLAYER_MARGIN) {
                    this.x = PLAYER_MARGIN;
                    this.vx = 0;
                }
                if (this.x > WORLD_WIDTH - PLAYER_MARGIN) {
                    this.x = WORLD_WIDTH - PLAYER_MARGIN;
                    this.vx = 0;
                }

                if (this.y >= GROUND) {
                    this.y = GROUND;
                    this.vy = 0;
                    this.grounded = true;
                    this.jumpCount = 0;
                    this.canWallJump = true;
                }
            }

            getAttackBox() {
                const offsetX = this.facingRight ? this.width / 2 : -this.width / 2 - this.attackWidth;
                return {
                    x: this.x + offsetX,
                    y: this.y - this.height / 2 - 25,
                    width: this.attackWidth,
                    height: this.attackHeight
                };
            }

            takeDamage(amount, knockbackDir, isCrit, attackerY) {
                this.health = Math.max(0, this.health - amount);
                this.hitStun = 20;

                document.getElementById('health' + (this === player1 ? 1 : 2)).style.width = this.health + '%';

                if (isCrit) {
                    this.vx = knockbackDir * 4.5;
                    const heightDiff = this.y - attackerY;
                    this.vy = -13 - Math.min(Math.abs(heightDiff) * 0.12, 6);
                    screenShake = 15;
                } else {
                    this.vx = knockbackDir * 5;
                    this.vy = -8;
                }

                this.grounded = false;
                this.jumpCount = this.maxJumps;
            }

            darkenColor(color) {
                const num = parseInt(color.replace("#",""), 16);
                const amt = 30;
                const usePound = true;
                const R = (num >> 16) & 255;
                const G = (num >> 8) & 255;
                const B = num & 255;
                return (usePound?"#":"") + (0x1000000 + (R-amt<255?R-amt<0?0:R-amt:255)*0x10000 +
                    (G-amt<255?G-amt<0?0:G-amt:255)*0x100 + (B-amt<255?B-amt<0?0:B-amt:255)).toString(16).slice(1);
            }

            draw(ctx) {
                ctx.save();
                
                const drawX = this.x - this.width / 2;
                const drawY = this.y - this.height;

                if (this.critGlow > 0) {
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 20 + this.critGlow * 30;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(drawX, drawY, this.width, this.height);
                    ctx.shadowBlur = 0;

                    const pulseAlpha = 0.3 + Math.sin(Date.now() * 0.015) * 0.2 * this.critGlow;
                    ctx.fillStyle = `rgba(255, 215, 0, ${pulseAlpha})`;
                    ctx.fillRect(drawX - 8, drawY - 8, this.width + 16, this.height + 16);
                }

                ctx.fillStyle = this.color;
                ctx.fillRect(drawX, drawY, this.width, this.height);

                ctx.fillStyle = this.darkenColor(this.color);
                ctx.fillRect(drawX, drawY + this.height * 0.65, this.width, this.height * 0.35);

                const eyeX = this.x + (this.facingRight ? 12 : -12);
                const eyeY = this.y - this.height * 0.72;
                ctx.fillStyle = 'white';
                ctx.fillRect(eyeX - 8, eyeY - 6, 16, 12);
                ctx.fillStyle = '#111';
                ctx.fillRect(eyeX + (this.facingRight ? 3 : -9), eyeY - 3, 8, 8);

                const swordX = this.x + (this.facingRight ? this.width / 2 : -this.width / 2);
                const swordY = this.y - this.height / 2;
                
                ctx.save();
                ctx.translate(swordX, swordY);
                ctx.rotate(this.facingRight ? 0.3 : -0.3);
                
                if (this.attacking) {
                    ctx.rotate(this.facingRight ? -0.8 : 0.8);
                }
                
                ctx.fillStyle = '#888';
                const swordLen = 55;
                ctx.fillRect(0, -6, this.facingRight ? swordLen : -swordLen, 12);
                ctx.fillStyle = '#bbb';
                ctx.fillRect(this.facingRight ? swordLen - 5 : -swordLen + 5, -8, 15, 16);
                ctx.fillStyle = '#654321';
                ctx.fillRect(this.facingRight ? 8 : -18, -9, 22, 18);
                
                ctx.restore();

                if (this.attacking) {
                    const attackBox = this.getAttackBox();
                    ctx.fillStyle = 'rgba(255, 255, 0, 0.25)';
                    ctx.fillRect(attackBox.x, attackBox.y, attackBox.width, attackBox.height);
                }

                ctx.restore();
            }
        }

        let player1, player2;
        let gameOver = false;
        let gameStarted = false;
        let countdownActive = false;
        let screenShake = 0;
        let floatingTexts = [];
        let particles = [];
        let animationId = null;

        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function updateComboDisplay() {
            if (player1.combo > 0) {
                document.getElementById('combo1').textContent = `Combo x${player1.combo}`;
                document.getElementById('combo1').style.opacity = '1';
            } else {
                document.getElementById('combo1').style.opacity = '0';
            }

            if (player2.combo > 0) {
                document.getElementById('combo2').textContent = `Combo x${player2.combo}`;
                document.getElementById('combo2').style.opacity = '1';
            } else {
                document.getElementById('combo2').style.opacity = '0';
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function updateOpponentStatus() {
            const statusEl = document.getElementById('opponentStatus');
            if (opponentRematchReady) {
                statusEl.textContent = '✓ Opponent is ready!';
                statusEl.style.color = '#4CAF50';
            } else {
                statusEl.textContent = 'Waiting for opponent...';
                statusEl.style.color = 'rgba(255, 255, 255, 0.7)';
            }
        }

        function handleGameOver(winner) {
            gameOver = true;
            if (winner === 1) player1Wins++;
            if (winner === 2) player2Wins++;

            const winnerName = winner === 1 ? 'Player 1' : 'Player 2';
            document.getElementById('winnerText').textContent = `${winnerName} Wins!`;
            document.getElementById('matchScore').textContent = `${player1Wins} - ${player2Wins}`;
            
            const rematchBtn = document.getElementById('rematchBtn');
            rematchBtn.textContent = 'Rematch';
            rematchBtn.classList.remove('ready');
            rematchBtn.disabled = false;
            
            document.getElementById('overlay').classList.add('active');

            rematchReady = false;
            opponentRematchReady = false;
            updateOpponentStatus();

            if (gameMode === 'online' && socket) {
                socket.emit('game_over', { winner, room: roomCode });
            }

            if (player1Wins >= MAX_WINS || player2Wins >= MAX_WINS) {
                setTimeout(() => {
                    const finalWinner = player1Wins >= MAX_WINS ? 'Player 1' : 'Player 2';
                    document.getElementById('winnerText').textContent = `${finalWinner} Wins the Match!`;
                    document.getElementById('matchScore').textContent = `Final Score: ${player1Wins} - ${player2Wins}`;
                    
                    document.getElementById('rematchBtn').disabled = true;
                    document.getElementById('quitBtn').textContent = 'Return to Lobby';
                }, 500);
            }
        }

        function endGame(winner) {
            gameOver = true;
            gameStarted = false;
            handleGameOver(winner);
        }

        function resetGameState() {
            gameOver = false;
            gameStarted = false;
            countdownActive = false;
            player1.health = 100;
            player2.health = 100;
            player1.x = 400;
            player2.x = WORLD_WIDTH - 400;
            player1.y = GROUND;
            player2.y = GROUND;
            player1.vx = 0;
            player2.vx = 0;
            player1.vy = 0;
            player2.vy = 0;
            player1.combo = 0;
            player2.combo = 0;
            floatingTexts = [];
            particles = [];
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('health1').style.width = '100%';
            document.getElementById('health2').style.width = '100%';
            updateComboDisplay();
            startCountdown();
        }

        function startNewRound() {
            rematchReady = false;
            opponentRematchReady = false;
            resetGameState();
        }

        function startCountdown() {
            countdownActive = true;
            gameStarted = false;
            let count = 3;
            const countdownEl = document.getElementById('countdown');
            const startTextEl = document.getElementById('startText');

            const countInterval = setInterval(() => {
                if (count > 0) {
                    countdownEl.textContent = count;
                    countdownEl.style.display = 'block';
                    countdownEl.style.opacity = '1';
                    playCountdown();
                    count--;
                } else {
                    clearInterval(countInterval);
                    countdownEl.style.display = 'none';
                    startTextEl.style.display = 'block';
                    startTextEl.style.opacity = '1';
                    playFightSound();
                    
                    setTimeout(() => {
                        startTextEl.style.display = 'none';
                        gameStarted = true;
                        countdownActive = false;
                    }, 800);
                }
            }, 1000);
        }

        function returnToLobby() {
            gameContainer.classList.add('hidden');
            waitingRoom.classList.remove('active');
            lobby.classList.remove('hidden');
            gameMode = 'offline';
            player1Wins = 0;
            player2Wins = 0;
            if (animationId) cancelAnimationFrame(animationId);
            if (socket) socket.disconnect();
            hostBtn.disabled = false;
            joinBtn.disabled = false;
            startBtn.disabled = false;
            showStatus('');
        }

        function initGame() {
            gameOver = false;
            gameStarted = false;
            countdownActive = false;
            floatingTexts = [];
            particles = [];
            
            player1 = new Player(400, '#4a9eff', {
                left: 'a',
                right: 'd',
                jump: 'w',
                attack: 'j'
            }, true);

            player2 = new Player(WORLD_WIDTH - 400, '#ff6b6b', {
                left: 'arrowleft',
                right: 'arrowright',
                jump: 'arrowup',
                attack: 'k'
            }, false);

            updateComboDisplay();
            startCountdown();
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            if (!player1 || !player2) {
                animationId = requestAnimationFrame(animate);
                return;
            }

            if (countdownActive || gameStarted) {
                if (!countdownActive && gameStarted) {
                    player1.update(keys, player2, gameMode === 'offline' || (gameMode === 'online' && myPlayerId === 1));
                    player2.update(keys, player1, gameMode === 'offline' || (gameMode === 'online' && myPlayerId === 2));

                    if (gameMode === 'online' && socket && (myPlayerId === 1 || myPlayerId === 2)) {
                        const myPlayer = myPlayerId === 1 ? player1 : player2;
                        socket.emit('game_state', {
                            room: roomCode,
                            playerId: myPlayerId,
                            x: myPlayer.x,
                            y: myPlayer.y,
                            vx: myPlayer.vx,
                            vy: myPlayer.vy,
                            health: myPlayer.health,
                            attacking: myPlayer.attacking,
                            facingRight: myPlayer.facingRight
                        });
                    }

                    const p1Attack = player1.getAttackBox();
                    const p2Attack = player2.getAttackBox();

                    if (player1.attacking && checkCollision(p1Attack, {
                        x: player2.x - player2.width / 2,
                        y: player2.y - player2.height,
                        width: player2.width,
                        height: player2.height
                    })) {
                        const isCrit = player1.canCrit;
                        const damage = isCrit ? 25 : 15;
                        const knockbackDir = player1.facingRight ? 1 : -1;
                        
                        player2.takeDamage(damage, knockbackDir, isCrit, player1.y);
                        player1.combo++;
                        player1.comboTimer = 120;
                        
                        floatingTexts.push(new FloatingText(player2.x, player2.y - 100, `-${damage}`, '#ff6b6b'));
                        
                        if (isCrit) {
                            playCritSound();
                            for (let i = 0; i < 8; i++) {
                                particles.push(new Particle(player2.x, player2.y, '#ffd700'));
                            }
                        } else {
                            playHitSound();
                            for (let i = 0; i < 4; i++) {
                                particles.push(new Particle(player2.x, player2.y, '#ff6b6b'));
                            }
                        }
                        
                        updateComboDisplay();
                        
                        if (player2.health <= 0) {
                            endGame(1);
                        }
                    }

                    if (player2.attacking && checkCollision(p2Attack, {
                        x: player1.x - player1.width / 2,
                        y: player1.y - player1.height,
                        width: player1.width,
                        height: player1.height
                    })) {
                        const isCrit = player2.canCrit;
                        const damage = isCrit ? 25 : 15;
                        const knockbackDir = player2.facingRight ? 1 : -1;
                        
                        player1.takeDamage(damage, knockbackDir, isCrit, player2.y);
                        player2.combo++;
                        player2.comboTimer = 120;
                        
                        floatingTexts.push(new FloatingText(player1.x, player1.y - 100, `-${damage}`, '#4a9eff'));
                        
                        if (isCrit) {
                            playCritSound();
                            for (let i = 0; i < 8; i++) {
                                particles.push(new Particle(player1.x, player1.y, '#ffd700'));
                            }
                        } else {
                            playHitSound();
                            for (let i = 0; i < 4; i++) {
                                particles.push(new Particle(player1.x, player1.y, '#4a9eff'));
                            }
                        }
                        
                        updateComboDisplay();
                        
                        if (player1.health <= 0) {
                            endGame(2);
                        }
                    }
                }
            }

            floatingTexts = floatingTexts.filter(t => t.update());
            particles = particles.filter(p => p.update());

            camera.targetZoom = 1 + (Math.abs(player2.x - player1.x) / 5000) * 0.5;
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.05;
            camera.x = (player1.x + player2.x) / 2;
            camera.y = WORLD_HEIGHT / 2;

            ctx.save();
            ctx.translate(WIDTH / 2, HEIGHT / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                screenShake *= 0.8;
            }

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

            ctx.fillStyle = '#2d3561';
            ctx.fillRect(0, GROUND, WORLD_WIDTH, WORLD_HEIGHT - GROUND);

            player1.draw(ctx);
            player2.draw(ctx);

            particles.forEach(p => p.draw(ctx));
            floatingTexts.forEach(t => t.draw(ctx));

            ctx.restore();

            if (!gameOver) {
                drawScoreCrown(ctx, player1Wins, true);
                drawScoreCrown(ctx, player2Wins, false);
            }

            animationId = requestAnimationFrame(animate);
        }

        document.getElementById('rematchBtn').addEventListener('click', () => {
            const rematchBtn = document.getElementById('rematchBtn');
            rematchBtn.textContent = '✓ Ready!';
            rematchBtn.classList.add('ready');
            rematchBtn.disabled = true;
            rematchReady = true;

            if (gameMode === 'online' && socket) {
                socket.emit('rematch_ready', { room: roomCode });
            } else if (gameMode === 'offline') {
                startNewRound();
            }

            updateOpponentStatus();
        });

        document.getElementById('quitBtn').addEventListener('click', () => {
            if (player1Wins >= MAX_WINS || player2Wins >= MAX_WINS) {
                returnToLobby();
            } else {
                returnToLobby();
            }
        });

        window.addEventListener('resize', () => {
            WIDTH = window.innerWidth;
            HEIGHT = window.innerHeight;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        });
    </script>
</body>
