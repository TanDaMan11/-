<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1v1 Sword Fight</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #lobby {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 1000;
        }

        #lobby.hidden {
            display: none;
        }

        .title {
            font-size: 72px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #4a9eff, 0 0 40px #4a9eff;
            margin-bottom: 60px;
            text-align: center;
        }

        .subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 200px;
        }

        .btn-host {
            background: linear-gradient(to bottom, #4CAF50, #45a049);
            color: white;
        }

        .btn-join {
            background: linear-gradient(to bottom, #4a9eff, #3d8bdf);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .join-form {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .join-form.active {
            display: flex;
        }

        .code-input {
            padding: 15px 30px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            border: 3px solid #4a9eff;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 200px;
            outline: none;
        }

        .code-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .status {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
            min-height: 30px;
        }

        .back-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        #waitingRoom {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        #waitingRoom.active {
            display: flex;
        }

        .waiting-content {
            text-align: center;
        }

        .waiting-title {
            font-size: 48px;
            font-weight: bold;
            color: #4a9eff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #4a9eff;
        }

        .room-code {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 5px;
        }

        .waiting-status {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        #startBtn {
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(to bottom, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            display: none;
        }

        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(76, 175, 80, 0.6);
        }

        #startBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #gameContainer.hidden {
            display: none;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #16213e 0%, #1a1a2e 100%);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            gap: 100px;
            pointer-events: none;
            z-index: 10;
        }

        .healthContainer {
            width: 280px;
        }

        .playerName {
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .p1 .playerName { color: #4a9eff; }
        .p2 .playerName { color: #ff6b6b; text-align: right; }

        .healthBar {
            width: 100%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .healthFill {
            height: 100%;
            transition: width 0.15s ease;
            border-radius: 12px;
        }

        .p1 .healthFill {
            background: linear-gradient(to bottom, #6db3f2, #4a9eff);
        }

        .p2 .healthFill {
            background: linear-gradient(to bottom, #ff8a8a, #ff6b6b);
            float: right;
        }

        .comboDisplay {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .p2 .comboDisplay { text-align: right; }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #overlay.active {
            display: flex;
        }

        #winnerText {
            color: white;
            font-size: 64px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .match-info {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .button-group-overlay {
            display: none;
            gap: 20px;
        }

        .button-group-overlay.active {
            display: flex;
        }

        #playAgainBtn, #quitBtn {
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        #playAgainBtn {
            background: linear-gradient(to bottom, #4CAF50, #45a049);
        }

        #playAgainBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        #playAgainBtn.ready {
            background: linear-gradient(to bottom, #ffd700, #ffed4e);
            color: #000;
        }

        #quitBtn {
            background: linear-gradient(to bottom, #ff6b6b, #ff5555);
        }

        #quitBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        #opponentStatus {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-top: 20px;
            min-height: 25px;
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px #ffd700, 0 0 60px #ffd700;
            z-index: 50;
            display: none;
            opacity: 0;
        }

        #startText {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #4CAF50, 0 0 40px #4CAF50;
            z-index: 50;
            display: none;
            opacity: 0;
        }

        .connection-status {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            color: #4CAF50;
            font-size: 14px;
            z-index: 10;
        }

        .connection-status.disconnected {
            color: #ff6b6b;
        }

        .connection-status.waiting {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div id="lobby">
        <h1 class="title">⚔️ Sword Duel</h1>
        <p class="subtitle">2-Player Online Combat</p>
        
        <div class="button-group" id="mainButtons">
            <button class="btn btn-host" id="hostBtn">Host Game</button>
            <button class="btn btn-join" id="joinBtn">Join Game</button>
        </div>

        <div class="join-form" id="joinForm">
            <input type="text" class="code-input" id="codeInput" placeholder="0000" maxlength="4" />
            <button class="btn btn-join" id="connectBtn">Connect</button>
            <button class="back-btn" id="backBtn">Back</button>
        </div>

        <p class="status" id="status"></p>
    </div>

    <div id="waitingRoom">
        <div class="waiting-content">
            <div class="waiting-title">⚔️ Game Room</div>
            <div class="room-code" id="roomCodeDisplay"></div>
            <div class="waiting-status" id="waitingStatus"></div>
            <button id="startBtn">Start Game</button>
        </div>
    </div>

    <div id="gameContainer" class="hidden">
        <canvas id="gameCanvas"></canvas>
        <div class="connection-status" id="connectionStatus">Offline</div>
        <div id="ui">
            <div class="healthContainer p1">
                <div class="playerName">Player 1</div>
                <div class="healthBar">
                    <div class="healthFill" id="health1" style="width: 100%"></div>
                </div>
                <div class="comboDisplay" id="combo1">Combo x2</div>
            </div>
            <div class="healthContainer p2">
                <div class="playerName">Player 2</div>
                <div class="healthBar">
                    <div class="healthFill" id="health2" style="width: 100%"></div>
                </div>
                <div class="comboDisplay" id="combo2">Combo x2</div>
            </div>
        </div>
        <div id="countdown"></div>
        <div id="startText">FIGHT!</div>
        <div id="overlay">
            <div id="winnerText">Player 1 Wins!</div>
            <div class="match-info" id="matchInfo"></div>
            <div class="button-group-overlay">
                <button id="playAgainBtn">Play Again</button>
                <button id="quitBtn">Return to Lobby</button>
            </div>
            <div id="opponentStatus"></div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://sword-duel-server.onrender.com';
        const GAME_TICK_RATE = 6; // Milliseconds between game updates (faster: 15ms = ~66 updates per second)
        
        let socket = null;
        let isHost = false;
        let isConnected = false;
        let roomCode = null;
        let myPlayerId = null;
        let gameMode = 'offline';
        let rematchReady = false;
        let opponentRematchReady = false;

        const lobby = document.getElementById('lobby');
        const waitingRoom = document.getElementById('waitingRoom');
        const gameContainer = document.getElementById('gameContainer');
        const hostBtn = document.getElementById('hostBtn');
        const joinBtn = document.getElementById('joinBtn');
        const joinForm = document.getElementById('joinForm');
        const codeInput = document.getElementById('codeInput');
        const connectBtn = document.getElementById('connectBtn');
        const backBtn = document.getElementById('backBtn');
        const status = document.getElementById('status');
        const mainButtons = document.getElementById('mainButtons');
        const connectionStatus = document.getElementById('connectionStatus');
        const startBtn = document.getElementById('startBtn');
        const waitingStatus = document.getElementById('waitingStatus');
        const roomCodeDisplay = document.getElementById('roomCodeDisplay');

        function showStatus(text, isError = false) {
            status.textContent = text;
            status.style.color = isError ? '#ff6b6b' : 'rgba(255, 255, 255, 0.8)';
        }

        function generateCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        function returnToLobby() {
            player1Wins = 0;
            player2Wins = 0;
            rematchReady = false;
            opponentRematchReady = false;
            gameContainer.classList.add('hidden');
            waitingRoom.classList.remove('active');
            lobby.classList.remove('hidden');
            gameMode = 'offline';
            if (socket) socket.disconnect();
            hostBtn.disabled = false;
            joinBtn.disabled = false;
            codeInput.value = '';
            mainButtons.style.display = 'flex';
            joinForm.classList.remove('active');
        }

        function connectToServer() {
            if (socket) {
                socket.disconnect();
            }
            
            socket = io(SERVER_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000
            });

            socket.on('connect', () => {
                console.log('Connected to server');
                isConnected = true;
                connectionStatus.textContent = 'Connected';
                connectionStatus.classList.remove('disconnected');
            });

            socket.on('disconnect', () => {
                console.log('Disconnected from server');
                isConnected = false;
                if (gameMode === 'online') {
                    connectionStatus.textContent = 'Disconnected';
                    connectionStatus.classList.add('disconnected');
                }
            });

            socket.on('connect_error', (error) => {
                console.log('Connection error:', error);
                showStatus('Failed to connect to server', true);
                isConnected = false;
                hostBtn.disabled = false;
                joinBtn.disabled = false;
            });

            socket.on('room_created', (data) => {
                roomCode = data.code;
                isHost = true;
                myPlayerId = 1;
                gameMode = 'online';
                
                lobby.classList.add('hidden');
                waitingRoom.classList.add('active');
                roomCodeDisplay.textContent = roomCode;
                waitingStatus.textContent = 'Waiting for opponent to join...';
                startBtn.style.display = 'none';
            });

            socket.on('room_joined', (data) => {
                roomCode = data.code;
                isHost = false;
                myPlayerId = 2;
                gameMode = 'online';
                
                lobby.classList.add('hidden');
                waitingRoom.classList.add('active');
                roomCodeDisplay.textContent = roomCode;
                waitingStatus.textContent = 'Connected! Waiting for host to start...';
                startBtn.style.display = 'none';
            });

            socket.on('player_joined', () => {
                if (isHost) {
                    waitingStatus.textContent = 'Player joined! Ready to start?';
                    startBtn.style.display = 'block';
                }
            });

            socket.on('game_start', () => {
                startGame();
            });

            socket.on('player_left', () => {
                returnToLobby();
            });

            socket.on('game_state', (data) => {
                updateGameState(data);
            });

            socket.on('game_over', (data) => {
                if (!gameOver) {
                    handleGameOver(data.winner);
                }
            });

            socket.on('rematch_ready', () => {
                opponentRematchReady = true;
                updateOpponentStatus();
                if (rematchReady && opponentRematchReady) {
                    resetGameState();
                    startCountdown();
                }
            });

            socket.on('return_lobby', () => {
                returnToLobby();
            });

            socket.on('error', (data) => {
                showStatus(data.message || 'An error occurred', true);
            });

            socket.on('full', () => {
                showStatus('Room is full', true);
                connectBtn.disabled = false;
                backBtn.disabled = false;
            });

            socket.on('not_found', () => {
                showStatus('Room not found', true);
                connectBtn.disabled = false;
                backBtn.disabled = false;
            });
        }

        hostBtn.addEventListener('click', () => {
            hostBtn.disabled = true;
            joinBtn.disabled = true;
            showStatus('Connecting to server...');
            connectToServer();
            
            const checkConnection = setInterval(() => {
                if (isConnected) {
                    clearInterval(checkConnection);
                    const code = generateCode();
                    socket.emit('create_room', { code });
                }
            }, 100);
            
            setTimeout(() => {
                clearInterval(checkConnection);
                if (!isConnected) {
                    showStatus('Failed to connect. Server may be down.', true);
                    hostBtn.disabled = false;
                    joinBtn.disabled = false;
                }
            }, 5000);
        });

        joinBtn.addEventListener('click', () => {
            mainButtons.style.display = 'none';
            joinForm.classList.add('active');
            codeInput.focus();
            showStatus('');
        });

        backBtn.addEventListener('click', () => {
            joinForm.classList.remove('active');
            mainButtons.style.display = 'flex';
            hostBtn.disabled = false;
            joinBtn.disabled = false;
            codeInput.value = '';
            showStatus('');
            if (socket) {
                socket.disconnect();
                socket = null;
            }
        });

        connectBtn.addEventListener('click', () => {
            const code = codeInput.value.trim();
            if (code.length !== 4 || !/^\d{4}$/.test(code)) {
                showStatus('Please enter a valid 4-digit code', true);
                return;
            }
            
            connectBtn.disabled = true;
            backBtn.disabled = true;
            showStatus('Connecting to server...');
            connectToServer();
            
            const checkConnection = setInterval(() => {
                if (isConnected) {
                    clearInterval(checkConnection);
                    socket.emit('join_room', { code });
                }
            }, 100);
            
            setTimeout(() => {
                clearInterval(checkConnection);
                if (!isConnected) {
                    showStatus('Failed to connect. Server may be down.', true);
                    connectBtn.disabled = false;
                    backBtn.disabled = false;
                }
            }, 5000);
        });

        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                connectBtn.click();
            }
        });

        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            waitingStatus.textContent = 'Starting game...';
            if (socket) {
                socket.emit('start_game', { room: roomCode });
            }
            setTimeout(() => {
                startGame();
            }, 500);
        });

        function startGame() {
            waitingRoom.classList.remove('active');
            gameContainer.classList.remove('hidden');
            initGame();
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let WIDTH = window.innerWidth;
        let HEIGHT = window.innerHeight;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        const WORLD_WIDTH = 3000;
        const WORLD_HEIGHT = 2000; // Increased sky height
        const GROUND = WORLD_HEIGHT - 100;
        const GRAVITY = 0.6;
        const FRICTION = 0.88;
        const WALL_FRICTION = 0.85;
        const WALL_JUMP_BONUS = -18; // Increased wall jump power
        const PLAYER_MARGIN = 50;

        const camera = {
            x: WORLD_WIDTH / 2,
            y: WORLD_HEIGHT / 2,
            zoom: 1,
            targetZoom: 1
        };

        let player1Wins = 0;
        let player2Wins = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration, volume = 0.3) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playHitSound() {
            playSound(180, 'square', 0.1, 0.4);
            playSound(120, 'sawtooth', 0.15, 0.3);
        }

        function playCritSound() {
            playSound(350, 'square', 0.15, 0.5);
            playSound(250, 'sawtooth', 0.25, 0.4);
            setTimeout(() => playSound(500, 'square', 0.2, 0.4), 80);
        }

        function playCountdown() {
            playSound(440, 'sine', 0.15, 0.4);
        }

        function playFightSound() {
            playSound(600, 'sine', 0.2, 0.5);
            setTimeout(() => playSound(800, 'sine', 0.3, 0.5), 100);
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.alpha = 1;
                this.scale = 0;
                this.vy = -4;
            }

            update() {
                this.y += this.vy;
                this.vy *= 0.92;
                this.alpha -= 0.015;
                if (this.scale < 1) this.scale += 0.12;
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.font = `bold ${28 * this.scale}px Arial`;
                ctx.fillStyle = this.color;
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 6;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.5) * 12 - 4;
                this.color = color;
                this.alpha = 1;
                this.size = Math.random() * 6 + 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.25;
                this.alpha -= 0.025;
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function drawCrown(ctx, x, y, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            
            ctx.fillStyle = '#ffd700';
            ctx.strokeStyle = '#b8860b';
            ctx.lineWidth = 2;
            
            // Base band of crown
            ctx.fillRect(-20, 8, 40, 6);
            
            // 5 main points
            const points = [-16, -8, 0, 8, 16];
            points.forEach(xOffset => {
                // Tall center point, shorter side points
                const height = xOffset === 0 ? 20 : 14;
                ctx.fillRect(xOffset - 2, -height, 4, height);
            });
            
            // Decorative jewels at base of points
            points.forEach(xOffset => {
                ctx.beginPath();
                ctx.arc(xOffset, 2, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Extra decorative elements
            ctx.fillRect(-12, 0, 3, 6);
            ctx.fillRect(9, 0, 3, 6);
            
            ctx.restore();
        }

        function drawScoreCrown(ctx, wins, isLeft) {
            ctx.save();
            
            const crownX = isLeft ? 50 : WIDTH - 50;
            const textX = isLeft ? 80 : WIDTH - 80;
            
            drawCrown(ctx, crownX, 50, 1.5);
            
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = '#fff';
            ctx.textAlign = isLeft ? 'left' : 'right';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(wins.toString(), textX, 65);
            
            ctx.restore();
        }

        class Player {
            constructor(x, color, controls, facingRight) {
                this.x = x;
                this.y = GROUND;
                this.width = 50;
                this.height = 80;
                this.vx = 0;
                this.vy = 0;
                this.color = color;
                this.health = 100;
                this.maxHealth = 100;
                this.controls = controls;
                this.facingRight = facingRight;
                this.grounded = true;
                this.attacking = false;
                this.attackCooldown = 0;
                this.attackDuration = 0;
                this.attackWidth = 70;
                this.attackHeight = 50;
                this.combo = 0;
                this.comboTimer = 0;
                this.lastHitTime = 0;
                this.hitStun = 0;
                this.jumpCount = 0;
                this.maxJumps = 2;
                this.canCrit = false;
                this.critGlow = 0;
                this.onWall = false;
                this.wallSide = 0;
                this.canWallJump = true;
                this.jumpPressed = false;
            }

            update(keys, other, isLocal) {
                if (this.hitStun > 0) {
                    this.hitStun--;
                    this.vx *= 0.92;
                }

                if (this.vy > 2) {
                    this.canCrit = true;
                    this.critGlow = Math.min(0.5, this.critGlow + 0.05); // More subtle glow
                } else {
                    this.canCrit = false;
                    this.critGlow = 0; // Immediately disappear on ground
                }

                const onLeftWall = this.x <= PLAYER_MARGIN;
                const onRightWall = this.x >= WORLD_WIDTH - PLAYER_MARGIN;
                
                this.onWall = (onLeftWall || onRightWall) && !this.grounded && this.vy > 0;
                this.wallSide = onLeftWall ? -1 : (onRightWall ? 1 : 0);

                if (this.onWall) {
                    this.vx *= WALL_FRICTION;
                    this.canCrit = false;
                }

                if (isLocal) {
                    if (keys[this.controls.left]) {
                        this.vx -= 1.4;
                        this.facingRight = false;
                        if (this.onWall && this.wallSide === 1) {
                            this.canWallJump = false;
                        }
                    }
                    if (keys[this.controls.right]) {
                        this.vx += 1.4;
                        this.facingRight = true;
                        if (this.onWall && this.wallSide === -1) {
                            this.canWallJump = false;
                        }
                    }

                    if (keys[this.controls.jump] && !this.jumpPressed) {
                        if (this.grounded) {
                            this.vy = -16;
                            this.grounded = false;
                            this.jumpCount = 1;
                            this.canWallJump = true;
                            playSound(300, 'sine', 0.1, 0.2);
                        } else if (this.jumpCount < this.maxJumps) {
                            if (this.onWall && this.canWallJump) {
                                this.vy = WALL_JUMP_BONUS;
                                this.vx += this.wallSide * 12; // Increased wall jump knockback
                                this.canWallJump = false;
                                playSound(400, 'sine', 0.15, 0.3);
                            } else if (this.jumpCount === 1) {
                                this.vy = -14;
                                this.jumpCount = 2;
                                playSound(280, 'sine', 0.1, 0.2);
                            }
                        }
                        this.jumpPressed = true;
                    } else if (!keys[this.controls.jump]) {
                        this.jumpPressed = false;
                    }

                    if (keys[this.controls.attack] && !this.attacking && this.attackCooldown === 0) {
                        this.attacking = true;
                        this.attackDuration = 12;
                        this.attackCooldown = 20;
                        this.combo++;
                        this.comboTimer = 40;
                    }
                }

                this.vx *= FRICTION;
                this.vy += GRAVITY;

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < PLAYER_MARGIN) {
                    this.x = PLAYER_MARGIN;
                }
                if (this.x > WORLD_WIDTH - PLAYER_MARGIN - this.width) {
                    this.x = WORLD_WIDTH - PLAYER_MARGIN - this.width;
                }

                if (this.y >= GROUND) {
                    this.y = GROUND;
                    if (this.vy > 0) {
                        this.vy = 0;
                        this.grounded = true;
                        this.jumpCount = 0;
                    }
                } else {
                    this.grounded = false;
                }

                this.attackDuration = Math.max(0, this.attackDuration - 1);
                this.attackCooldown = Math.max(0, this.attackCooldown - 1);
                this.comboTimer = Math.max(0, this.comboTimer - 1);
                if (this.comboTimer === 0) {
                    this.combo = 0;
                }

                if (!this.attacking && this.attackDuration === 0) {
                    this.attacking = false;
                }
            }

            checkCollision(other) {
                if (this.attackDuration > 0 && this.attacking) {
                    const attackX = this.x + (this.facingRight ? 30 : -this.attackWidth);
                    const attackY = this.y + 15;

                    if (other.x < attackX + this.attackWidth &&
                        other.x + other.width > attackX &&
                        other.y < attackY + this.attackHeight &&
                        other.y + other.height > attackY) {

                        const damage = this.combo * 5 + 10;
                        const isCrit = this.canCrit && this.combo > 1;
                        const finalDamage = isCrit ? damage * 1.8 : damage;

                        other.health -= finalDamage;
                        other.hitStun = 10;
                        other.vx += this.facingRight ? 8 : -8;
                        other.vy = -4;

                        floatingTexts.push(new FloatingText(other.x + other.width / 2, other.y, 
                            Math.round(finalDamage), isCrit ? '#ffff00' : '#ff6b6b'));

                        if (isCrit) {
                            playCritSound();
                            for (let i = 0; i < 12; i++) {
                                particles.push(new Particle(other.x + other.width / 2, other.y + other.height / 2, '#ffff00'));
                            }
                        } else {
                            playHitSound();
                            for (let i = 0; i < 6; i++) {
                                particles.push(new Particle(other.x + other.width / 2, other.y + other.height / 2, '#ff6b6b'));
                            }
                        }

                        if (socket && gameMode === 'online') {
                            socket.emit('attack_hit', {
                                damage: finalDamage,
                                isCrit: isCrit,
                                defenderHealth: other.health
                            });
                        }

                        this.attacking = false;
                    }
                }
            }

            draw(ctx, cameraX, cameraY) {
                const screenX = this.x - cameraX;
                const screenY = this.y - cameraY;

                ctx.save();
                ctx.fillStyle = this.color;
                ctx.fillRect(screenX - this.width / 2, screenY - this.height, this.width, this.height);

                if (this.critGlow > 0) {
                    ctx.globalAlpha = this.critGlow * 0.4; // Subtle glow
                    ctx.fillStyle = '#ffff00';
                    ctx.fillRect(screenX - this.width / 2 - 5, screenY - this.height - 5, this.width + 10, this.height + 10);
                }

                if (this.attacking && this.attackDuration > 0) {
                    ctx.fillStyle = 'rgba(255, 200, 0, 0.6)';
                    const attackX = this.facingRight ? screenX + this.width / 2 : screenX - this.width / 2 - this.attackWidth;
                    ctx.fillRect(attackX, screenY - this.height + 15, this.attackWidth, this.attackHeight);
                }

                ctx.restore();
            }
        }

        let floatingTexts = [];
        let particles = [];
        let gameOver = false;
        let countdownActive = false;

        function initGame() {
            floatingTexts = [];
            particles = [];
            gameOver = false;
            countdownActive = false;
            player1 = new Player(800, '#4a9eff', { left: 'a', right: 'd', jump: 'w', attack: ' ' }, true);
            player2 = new Player(WORLD_WIDTH - 800, '#ff6b6b', { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', attack: 'Enter' }, false);
            startCountdown();
        }

        function startCountdown() {
            gameOver = false;
            countdownActive = true;
            let count = 3;
            const countdownEl = document.getElementById('countdown');
            const startTextEl = document.getElementById('startText');

            const countInterval = setInterval(() => {
                if (count > 0) {
                    countdownEl.textContent = count;
                    countdownEl.style.display = 'block';
                    countdownEl.style.opacity = '1';
                    playCountdown();
                    count--;
                } else {
                    countdownEl.style.display = 'none';
                    startTextEl.style.display = 'block';
                    startTextEl.style.opacity = '1';
                    playFightSound();
                    clearInterval(countInterval);
                    
                    setTimeout(() => {
                        startTextEl.style.display = 'none';
                        countdownActive = false;
                        gameLoop();
                    }, 500);
                }
            }, 1000);
        }

        function resetGameState() {
            player1.health = 100;
            player2.health = 100;
            player1.x = 800;
            player2.x = WORLD_WIDTH - 800;
            player1.y = GROUND;
            player2.y = GROUND;
            player1.vx = 0;
            player1.vy = 0;
            player2.vx = 0;
            player2.vy = 0;
            player1.attacking = false;
            player2.attacking = false;
            player1.combo = 0;
            player2.combo = 0;
            floatingTexts = [];
            particles = [];
            rematchReady = false;
            opponentRematchReady = false;
            gameOver = false;
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('playAgainBtn').classList.remove('ready');
            document.getElementById('playAgainBtn').textContent = 'Play Again';
            document.querySelector('.button-group-overlay').classList.remove('active');
            updateHealthBars();
        }

        let player1, player2;

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function updateGameState(data) {
            if (myPlayerId === 1) {
                player2.x = data.x;
                player2.y = data.y;
                player2.vx = data.vx;
                player2.vy = data.vy;
                player2.facingRight = data.facingRight;
                player2.attacking = data.attacking;
                player2.attackDuration = data.attackDuration;
                player2.health = data.health;
                player2.canCrit = data.canCrit;
                player2.critGlow = data.critGlow;
                player2.grounded = data.grounded;
            } else {
                player1.x = data.x;
                player1.y = data.y;
                player1.vx = data.vx;
                player1.vy = data.vy;
                player1.facingRight = data.facingRight;
                player1.attacking = data.attacking;
                player1.attackDuration = data.attackDuration;
                player1.health = data.health;
                player1.canCrit = data.canCrit;
                player1.critGlow = data.critGlow;
                player1.grounded = data.grounded;
            }
        }

        function updateHealthBars() {
            document.getElementById('health1').style.width = Math.max(0, (player1.health / player1.maxHealth) * 100) + '%';
            document.getElementById('health2').style.width = Math.max(0, (player2.health / player2.maxHealth) * 100) + '%';
            
            if (player1.combo > 0) {
                document.getElementById('combo1').textContent = `Combo x${player1.combo}`;
                document.getElementById('combo1').style.opacity = '1';
            } else {
                document.getElementById('combo1').style.opacity = '0';
            }

            if (player2.combo > 0) {
                document.getElementById('combo2').textContent = `Combo x${player2.combo}`;
                document.getElementById('combo2').style.opacity = '1';
            } else {
                document.getElementById('combo2').style.opacity = '0';
            }
        }

        function handleGameOver(winner) {
            gameOver = true;
            if (myPlayerId === winner) {
                if (myPlayerId === 1) {
                    player1Wins++;
                } else {
                    player2Wins++;
                }
            }
            document.getElementById('winnerText').textContent = `Player ${winner} Wins!`;
            document.getElementById('matchInfo').textContent = `${player1Wins} - ${player2Wins}`;
            document.querySelector('.button-group-overlay').classList.add('active');
            document.getElementById('overlay').classList.add('active');
            updateOpponentStatus();
        }

        function updateOpponentStatus() {
            const statusEl = document.getElementById('opponentStatus');
            if (opponentRematchReady) {
                statusEl.textContent = 'Opponent ready for rematch';
            } else if (rematchReady) {
                statusEl.textContent = 'Waiting for opponent...';
            } else {
                statusEl.textContent = '';
            }
        }

        document.getElementById('playAgainBtn').addEventListener('click', () => {
            if (!rematchReady) {
                rematchReady = true;
                document.getElementById('playAgainBtn').classList.add('ready');
                document.getElementById('playAgainBtn').textContent = 'Ready!';
                updateOpponentStatus();

                if (socket && gameMode === 'online') {
                    socket.emit('rematch_ready', { room: roomCode });
                }

                if (gameMode === 'offline' && opponentRematchReady) {
                    resetGameState();
                    startCountdown();
                }
            }
        });

        document.getElementById('quitBtn').addEventListener('click', () => {
            if (socket && gameMode === 'online') {
                socket.emit('return_lobby', { room: roomCode });
            }
            returnToLobby();
        });

        function gameLoop() {
            if (gameOver || countdownActive) return;

            const isLocalPlayer1 = myPlayerId === 1 || gameMode === 'offline';

            if (isLocalPlayer1) {
                player1.update(keys, player2, true);
            } else {
                player2.update(keys, player1, true);
            }

            player1.checkCollision(player2);
            player2.checkCollision(player1);

            if (gameMode === 'online') {
                if (isLocalPlayer1) {
                    socket.emit('game_state', {
                        x: player1.x,
                        y: player1.y,
                        vx: player1.vx,
                        vy: player1.vy,
                        facingRight: player1.facingRight,
                        attacking: player1.attacking,
                        attackDuration: player1.attackDuration,
                        health: player1.health,
                        canCrit: player1.canCrit,
                        critGlow: player1.critGlow,
                        grounded: player1.grounded
                    });
                } else {
                    socket.emit('game_state', {
                        x: player2.x,
                        y: player2.y,
                        vx: player2.vx,
                        vy: player2.vy,
                        facingRight: player2.facingRight,
                        attacking: player2.attacking,
                        attackDuration: player2.attackDuration,
                        health: player2.health,
                        canCrit: player2.canCrit,
                        critGlow: player2.critGlow,
                        grounded: player2.grounded
                    });
                }
            } else {
                player2.update(keys, player1, false);
            }

            floatingTexts = floatingTexts.filter(text => text.update());
            particles = particles.filter(p => p.update());

            updateHealthBars();

            if (player1.health <= 0) {
                if (socket && gameMode === 'online') {
                    socket.emit('game_over', { winner: 2 });
                }
                handleGameOver(2);
                return;
            }

            if (player2.health <= 0) {
                if (socket && gameMode === 'online') {
                    socket.emit('game_over', { winner: 1 });
                }
                handleGameOver(1);
                return;
            }

            draw();

            if (!gameOver && !countdownActive) {
                setTimeout(gameLoop, GAME_TICK_RATE);
            }
        }

        function draw() {
            const targetX = (player1.x + player2.x) / 2;
            const targetY = (player1.y + player2.y) / 2;

            camera.x += (targetX - camera.x) * 0.05;
            camera.y += (targetY - camera.y) * 0.05;

            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            ctx.fillStyle = 'linear-gradient(to bottom, #0a0e27 0%, #1a1a3e 50%, #2a1a1e 100%)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            ctx.save();
            ctx.translate(WIDTH / 2, HEIGHT / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            const groundScreenY = GROUND - camera.y + HEIGHT / 2;
            ctx.fillStyle = '#2a3f5f';
            ctx.fillRect(0, groundScreenY, WORLD_WIDTH, 200);

            player1.draw(ctx, camera.x, camera.y);
            player2.draw(ctx, camera.x, camera.y);

            particles.forEach(p => p.draw(ctx));
            floatingTexts.forEach(t => t.draw(ctx));

            ctx.restore();

            drawScoreCrown(ctx, player1Wins, true);
            drawScoreCrown(ctx, player2Wins, false);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            WIDTH = window.innerWidth;
            HEIGHT = window.innerHeight;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        });
    </script>
</body>
